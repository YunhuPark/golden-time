name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Type Check (Frontend)
      run: npm run type-check
      
    - name: Type Check (API)
      run: npm run type-check:api
      
    - name: Lint
      run: npm run lint
      
    - name: API Tests
      run: npm run test:api
      
    - name: Build
      run: npm run build
      env:
        # Dummy values to pass validate-env.cjs in CI
        VITE_KAKAO_MAP_APP_KEY: dummy_kakao_key
        VITE_SUPABASE_URL: https://dummy.supabase.co
        VITE_SUPABASE_ANON_KEY: dummy_anon_key
        VITE_ENCRYPTION_KEY: dummy_encryption_key_that_is_long_enough_for_aes_256_gcm
        EGEN_SERVICE_KEY: dummy_egen_key
        KAKAO_REST_API_KEY: dummy_kakao_rest_key
